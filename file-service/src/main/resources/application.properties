# ===== SERVER =====
server.port=8082
# B\u1eadt t\u00ednh n\u0103ng hi\u1ec3n th\u1ecb tin nh\u1eafn l\u1ed7i chi ti\u1ebft ra ngo\u00e0i API
server.error.include-message=always


# ===== DATABASE =====
spring.datasource.url=jdbc:mysql://localhost:3306/file_db?createDatabaseIfNotExist=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# ===== MINIO STORAGE =====
# Cấu hình kết nối MinIO Storage
hocviec.minio.endpoint=http://localhost:9000
hocviec.minio.accessKey=admin
hocviec.minio.secretKey=superMinio123
hocviec.minio.bucketName=hocviec-media

hocviec.jwt.signer-key=abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789

spring.cloud.compatibility-verifier.enabled=false


# ==== Consul =====
spring.application.name=file-service
spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.instance-id=${spring.application.name}:${random.value}

management.endpoints.web.exposure.include=health